version: '3.9'

services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
        VITE_WS_BASE_URL: ws://localhost:5000/ws
        VITE_USE_MOCK: "false"
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/ai_interview_prep
      JWT_SECRET: replace_with_strong_secret
      CLIENT_ORIGIN: http://localhost:8080
      PUBLIC_SERVER_URL: http://localhost:5000
      REDIS_URL: redis://redis:6379
      EVALUATION_MODE: redis
      STORAGE_DRIVER: local
      UPLOAD_DIR: uploads
      INTERVIEW_EVALUATION_CONCURRENCY: 4
      MONGO_MAX_POOL_SIZE: 30
      MONGO_MIN_POOL_SIZE: 5
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - redis

  worker:
    build:
      context: ./backend
    command: ["node", "src/worker.js"]
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/ai_interview_prep
      JWT_SECRET: replace_with_strong_secret
      REDIS_URL: redis://redis:6379
      EVALUATION_MODE: redis
      STORAGE_DRIVER: local
      UPLOAD_DIR: uploads
      INTERVIEW_EVALUATION_CONCURRENCY: 4
      MONGO_MAX_POOL_SIZE: 15
      MONGO_MIN_POOL_SIZE: 2
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  mongo_data:
