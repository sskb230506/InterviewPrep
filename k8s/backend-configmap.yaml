apiVersion: v1
kind: ConfigMap
metadata:
  name: interview-backend-config
data:
  NODE_ENV: production
  PORT: "5000"
  CLIENT_ORIGIN: https://app.example.com
  PUBLIC_SERVER_URL: https://api.example.com
  EVALUATION_MODE: redis
  STORAGE_DRIVER: s3
  REDIS_URL: redis://interview-redis:6379
  INTERVIEW_EVALUATION_QUEUE: interview-answer-evaluations
  INTERVIEW_EVALUATION_CONCURRENCY: "4"
  DIRECT_UPLOADS_ENABLED: "true"
  DIRECT_UPLOAD_URL_EXPIRES_IN: "900"
  DIRECT_UPLOAD_TOKEN_TTL: 15m
  MONGO_MAX_POOL_SIZE: "30"
  MONGO_MIN_POOL_SIZE: "5"
  MONGO_MAX_IDLE_TIME_MS: "30000"
  MONGO_SERVER_SELECTION_TIMEOUT_MS: "5000"
  AWS_REGION: us-east-1
  S3_BUCKET: interview-prep-assets
  S3_PUBLIC_BASE_URL: https://cdn.example.com
