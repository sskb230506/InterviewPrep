apiVersion: apps/v1
kind: Deployment
metadata:
  name: interview-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: interview-backend
  template:
    metadata:
      labels:
        app: interview-backend
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/interview-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: interview-backend-config
            - secretRef:
                name: interview-backend-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: interview-backend
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: interview-backend
---
apiVersion: v1
kind: Service
metadata:
  name: interview-backend
spec:
  selector:
    app: interview-backend
  ports:
    - name: http
      port: 80
      targetPort: 5000
    - name: ws
      port: 5000
      targetPort: 5000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: interview-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: interview-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
