apiVersion: apps/v1
kind: Deployment
metadata:
  name: interview-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: interview-redis
  template:
    metadata:
      labels:
        app: interview-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: interview-redis
spec:
  selector:
    app: interview-redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: interview-redis
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: interview-redis
