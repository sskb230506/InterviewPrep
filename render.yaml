services:
  # Backend Web Service
  - type: web
    name: interpreparation-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LLM_MODEL_EXTRACTION
        value: llama-3.1-8b-instant
      - key: LLM_MODEL_REASONING
        value: llama-3.3-70b-versatile
      - key: LLM_MODEL_JUDGE
        value: llama-3.1-8b-instant
      - key: WHISPER_API_KEY
        sync: false
      - key: WHISPER_BASE_URL
        value: https://api.groq.com/openai/v1/audio/transcriptions
      - key: WHISPER_MODEL
        value: whisper-large-v3

  # Frontend Static Site
  - type: web
    name: interpreparation-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
